<!DOCTYPE html>
<html lang="pt_BR">
<head>
  <meta charset="utf-8">
  <title>Links</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <div class="container">
    <h2>Meus Links</h2>
    
    <div class="mb-3">
      <a href="{% url 'cadastrar' %}" class="btn btn-primary">+ Cadastrar novo link</a>
      <form method="post" action="{% url 'logout' %}" style="display:inline">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sair</button>
      </form>
    </div>

    <table class="table table-bordered">
      <thead>
        <tr>
          <th>Título</th>
          <th>Link</th>
          <th>Observação</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        {% for link in links %}
        <tr>
          <td>{{ link.titulo }}</td>
          <td><a href="{{ link.link }}" target="_blank">{{ link.link }}</a></td>
          <td>{{ link.observacao }}</td>
          <td>
            <a href="{% url 'atualizar' link.pk %}" class="btn btn-warning btn-sm">Editar</a>
            <a href="{% url 'remover' link.pk %}" class="btn btn-danger btn-sm">Remover</a>
          </td>
        </tr>
        {% empty %}
        <tr><td colspan="4">Nenhum link cadastrado.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</body>
</html>
