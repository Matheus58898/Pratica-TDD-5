<!DOCTYPE html>
<html lang="pt_BR">
<head>
  <meta charset="utf-8">
  <title>Login Práticas TDD 5</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      border: none;
      border-radius: 1rem;
      width: 100%;
      max-width: 700px;
    }
    .login-icon { font-size: 3rem; color: #0d6efd; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card p-4 text-center bg-light text-dark">
      <i class="fas fa-user-circle login-icon"></i>
      <h4 class="mb-2">Bem-vindo!</h4>
      <p class="text-muted mb-4">Acesse o sistema LinkPedia</p>

      <form action="{% url 'login' %}" method="POST">
        {% csrf_token %}

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <div class="mb-3 text-start">
          <label class="form-label">E-Mail:</label>
          <input type="text" name="username" class="form-control" placeholder="Digite seu usuário">
        </div>

        <div class="mb-3 text-start">
          <label class="form-label">Senha:</label>
          <input type="password" name="password" class="form-control" placeholder="Digite sua senha">
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-3">
          <i class="fas fa-sign-in-alt me-2"></i> Acessar
        </button>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
